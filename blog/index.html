<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブログ｜カンティーナ赤坂 — 福岡赤坂のバー食堂</title>
<meta name="description" content="福岡・赤坂のバー食堂「カンティーナ赤坂」のブログ。赤坂での過ごし方、ウイスキーやワインの楽しみ方、お店の日々をお届けします。">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="canonical" href="https://cancan-wine.vercel.app/blog/">
<meta name="theme-color" content="#0c0906">
<meta property="og:type" content="website">
<meta property="og:title" content="ブログ｜カンティーナ赤坂">
<meta property="og:description" content="赤坂での過ごし方、ウイスキーやワインの楽しみ方をお届け。">
<meta property="og:url" content="https://cancan-wine.vercel.app/blog/">
<meta property="og:image" content="https://cancan-wine.vercel.app/og-image.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0c0906;--ink-2:#14100a;--ink-3:#1d160e;--line:rgba(207,58,55,0.26);--line-soft:rgba(207,58,55,0.13);--red:#cf3a37;--red-2:#ef7a72;--cream:#efe7d6;--muted:#a3947c;--serif:'Cormorant Garamond','Shippori Mincho',serif;--mincho:'Shippori Mincho',serif;--sans:'Jost',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mincho);background:var(--ink);color:var(--cream);line-height:1.9;-webkit-font-smoothing:antialiased}
a{color:inherit}
header{position:sticky;top:0;z-index:50;background:rgba(12,9,6,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);padding:16px 22px;display:flex;align-items:center;gap:16px}
header .home{font-family:var(--serif);font-size:22px;color:var(--cream);text-decoration:none}
header .home b{color:var(--red);font-weight:500}
header .back{margin-left:auto;font-family:var(--sans);font-size:12px;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:8px 14px;transition:all .25s}
header .back:hover{border-color:var(--red);color:var(--red-2)}
.wrap{max-width:760px;margin:0 auto;padding:56px 22px 90px}
.eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:var(--red);display:inline-flex;align-items:center;gap:12px}
.eyebrow::before{content:"";width:30px;height:1px;background:var(--red)}
h1.page{font-family:var(--serif);font-weight:500;font-size:clamp(34px,7vw,52px);margin:16px 0 10px}
.lead{color:var(--muted);font-size:14.5px;margin-bottom:44px}
.post-card{display:block;text-decoration:none;border-bottom:1px solid var(--line-soft);padding:26px 0;transition:padding-left .3s}
.post-card:hover{padding-left:8px}
.post-card .date{font-family:var(--sans);font-size:11px;letter-spacing:0.14em;color:var(--red-2)}
.post-card h2{font-family:var(--serif);font-weight:500;font-size:26px;color:var(--cream);margin:6px 0 8px;line-height:1.35}
.post-card p{color:rgba(239,231,214,0.72);font-size:14.5px}
.post-card .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.tag{font-family:var(--sans);font-size:11px;color:var(--muted);border:1px solid var(--line);padding:5px 11px}
/* article view */
.article .date{font-family:var(--sans);font-size:12px;letter-spacing:0.14em;color:var(--red-2)}
.article h1{font-family:var(--serif);font-weight:500;font-size:clamp(30px,6vw,46px);line-height:1.25;margin:12px 0 8px}
.article .tags{margin:14px 0 30px}
.article .rule{width:56px;height:1px;background:var(--red);opacity:.6;margin:0 0 28px}
.article .body{font-size:16px;line-height:2.05;color:#f2ece0}
.article .body h3{font-family:var(--serif);font-weight:500;font-size:24px;color:var(--red-2);margin:32px 0 10px}
.article .body p{margin-bottom:18px}
.article .cta{margin-top:44px;padding-top:26px;border-top:1px solid var(--line-soft)}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:13px;letter-spacing:0.1em;color:#fff;background:var(--red);border:1px solid var(--red);padding:14px 26px;text-decoration:none;transition:background .3s}
.btn:hover{background:#b62e2b}
.back-list{display:inline-block;margin-top:34px;font-family:var(--sans);font-size:12px;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line)}
.back-list:hover{color:var(--red-2)}
.empty{color:var(--muted);text-align:center;padding:60px 0}
@media(max-width:560px){.wrap{padding:40px 20px 70px}.article .body{font-size:15.5px}}
:focus-visible{outline:2px solid var(--red);outline-offset:2px}
</style>
</head>
<body>
<header>
  <a href="/" class="home">Cantina <b>Akasaka</b></a>
  <a href="/" class="back">サイトへ戻る</a>
</header>

<div class="wrap" id="wrap">
  <div class="empty">読み込み中…</div>
</div>

<script id="ld" type="application/ld+json"></script>
<script>
  var POSTS=[];
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

  fetch('posts.json',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(d){ POSTS=(d&&d.posts)||[]; route(); })
    .catch(function(){ document.getElementById('wrap').innerHTML='<div class="empty">記事を読み込めませんでした。</div>'; });

  window.addEventListener('hashchange',route);

  function route(){
    var slug=decodeURIComponent(location.hash.replace(/^#/,''));
    var post=POSTS.filter(function(p){return p.slug===slug;})[0];
    if(post){ renderArticle(post); } else { renderList(); }
    window.scrollTo(0,0);
  }

  function tagHtml(tags){
    return (tags||[]).map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('');
  }

  function renderList(){
    document.title='ブログ｜カンティーナ赤坂 — 福岡赤坂のバー食堂';
    setLD(null);
    var items=POSTS.map(function(p){
      return '<a class="post-card" href="#'+encodeURIComponent(p.slug)+'">'+
        '<div class="date">'+esc(p.date)+'</div>'+
        '<h2>'+esc(p.title)+'</h2>'+
        '<p>'+esc(p.excerpt)+'</p>'+
        '<div class="tags">'+tagHtml(p.tags)+'</div></a>';
    }).join('');
    document.getElementById('wrap').innerHTML=
      '<span class="eyebrow">Journal</span>'+
      '<h1 class="page">赤坂だより</h1>'+
      '<p class="lead">赤坂での過ごし方、ウイスキーやワインの楽しみ方、お店の日々を綴っています。</p>'+
      (items||'<div class="empty">まだ記事がありません。</div>');
  }

  function renderArticle(p){
    document.title=p.title+'｜カンティーナ赤坂';
    setLD(p);
    document.getElementById('wrap').innerHTML=
      '<article class="article">'+
made(p)+
      '</article>';
  }
  function made(p){
    return '<div class="date">'+esc(p.date)+'</div>'+
      '<h1>'+esc(p.title)+'</h1>'+
      '<div class="tags">'+tagHtml(p.tags)+'</div>'+
      '<div class="rule"></div>'+
      '<div class="body">'+(p.body||'')+'</div>'+
      '<div class="cta"><a class="btn" href="https://www.hotpepper.jp/strJ000670170/" target="_blank" rel="noopener">ご予約はこちら</a></div>'+
      '<a class="back-list" href="#">← 記事一覧へ戻る</a>';
  }

  function setLD(p){
    var el=document.getElementById('ld');
    if(!p){ el.textContent=''; return; }
    el.textContent=JSON.stringify({
      "@context":"https://schema.org","@type":"BlogPosting",
      "headline":p.title,"datePublished":p.date,"dateModified":p.date,
      "author":{"@type":"Organization","name":"カンティーナ赤坂"},
      "publisher":{"@type":"Organization","name":"カンティーナ赤坂"},
      "mainEntityOfPage":"https://cancan-wine.vercel.app/blog/#"+p.slug,
      "keywords":(p.tags||[]).join(", "),"description":p.excerpt
    });
  }
</script>
</body>
</html>
